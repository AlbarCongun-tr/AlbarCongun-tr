# Pool of tips shown in "Weekly Code Tip". One is picked per week
# deterministically, based on ISO week number.
weekly_tips:
  - "In Kotlin, sealed classes give you exhaustive checks in when blocks — no else branch needed."
  - "In the Paper API, never touch the Bukkit API from an async thread when using scheduler.runTaskAsynchronously — sync back to the main thread first."
  - "When writing Fabric mods, choosing the right Mixin injection point matters for performance — prefer @ModifyVariable over @Inject where possible."
  - "Java records give you immutable data carriers with far less boilerplate than classes."
  - "In Spigot, EventPriority.MONITOR is for observing only — never cancel an event there."
  - "Writing commit messages as 'type: description' (feat, fix, chore) makes project history far more readable."
  - "Use multi-stage Docker builds to keep images small — don't ship build-time dependencies in the final image."

