name: Recent Activity Feed

# Pulls your last 5 GitHub events (push, PR, issue, star, etc.) and
# writes them into the "Recent Activity" section of README.md.
# Source: jamesgeorge007/github-activity-readme (actively maintained).

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch: {}

jobs:
  update-activity:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate recent activity list
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_MSG: "chore: update recent activity"
          MAX_LINES: 5
          SECTION_NAME: "activity"
