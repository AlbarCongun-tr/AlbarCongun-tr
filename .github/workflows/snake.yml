# ============================================================
# SETUP — read this before using
# ============================================================
# This workflow is what generates the animated snake that
# "eats" your contribution graph, referenced in README.md.
# It is NOT optional decoration — the snake image will show as
# broken until this runs at least once.
#
# 1. In your profile repo (github.com/AlbarCongun-tr/AlbarCongun-tr),
#    create the path:  .github/workflows/snake.yml
#    and paste this file's contents into it.
# 2. Commit it to your default branch (main or master).
# 3. Go to the "Actions" tab of that repo → you should see
#    "generate animated snake" → click "Run workflow" once
#    manually the first time (don't wait for the schedule).
# 4. After it finishes (~1 min), an "output" branch will exist
#    with the generated SVGs. That's what README.md points to.
# 5. From then on it re-runs automatically every 6 hours via
#    the schedule below, so it stays up to date with no
#    further action from you.
#
# No secrets need to be created — GITHUB_TOKEN is provided
# automatically by GitHub Actions.
# ============================================================

name: generate animated snake

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: AlbarCongun-tr
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
